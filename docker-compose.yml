version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kredo-postgres
    environment:
      POSTGRES_USER: kredo_user
      POSTGRES_PASSWORD: kredo_password
      POSTGRES_DB: kredo_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: kredo-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: always

volumes:
  postgres_data:
  redis_data:
